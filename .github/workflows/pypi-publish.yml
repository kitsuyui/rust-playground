name: python

on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    # "released" events are emitted either when directly be released or be edited from pre-released.
    types: [prereleased, released]

env:
  # Use git tag when release, otherwise use commit hash.
  VERSION: ${{ (github.event_name == 'release' && !github.event.release.prerelease) && github.ref_name || github.sha }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}-py${{ matrix.python }}-${{ matrix.rust_target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.14"
            os: "ubuntu-latest"
            rust_target: "x86_64-unknown-linux-gnu"
          - python: "3.10"
            os: "ubuntu-latest"
            rust_target: "x86_64-unknown-linux-gnu"
          - python: "3.11"
            os: "ubuntu-latest"
            rust_target: "x86_64-unknown-linux-gnu"
          - python: "3.12"
            os: "ubuntu-latest"
            rust_target: "x86_64-unknown-linux-gnu"
          - python: "3.13"
            os: "ubuntu-latest"
            rust_target: "x86_64-unknown-linux-gnu"
          - python: "3.14"
            os: "macos-latest"
            rust_target: "x86_64-apple-darwin"
          - python: "3.10"
            os: "macos-latest"
            rust_target: "x86_64-apple-darwin"
          - python: "3.11"
            os: "macos-latest"
            rust_target: "x86_64-apple-darwin"
          - python: "3.12"
            os: "macos-latest"
            rust_target: "x86_64-apple-darwin"
          - python: "3.13"
            os: "macos-latest"
            rust_target: "x86_64-apple-darwin"
          - python: "3.14"
            os: "macos-latest"
            rust_target: "aarch64-apple-darwin"
          - python: "3.10"
            os: "macos-latest"
            rust_target: "aarch64-apple-darwin"
          - python: "3.11"
            os: "macos-latest"
            rust_target: "aarch64-apple-darwin"
          - python: "3.12"
            os: "macos-latest"
            rust_target: "aarch64-apple-darwin"
          - python: "3.13"
            os: "macos-latest"
            rust_target: "aarch64-apple-darwin"
          - python: "3.14"
            os: "windows-latest"
            rust_target: "x86_64-pc-windows-msvc"
          - python: "3.10"
            os: "windows-latest"
            rust_target: "x86_64-pc-windows-msvc"
          - python: "3.11"
            os: "windows-latest"
            rust_target: "x86_64-pc-windows-msvc"
          - python: "3.12"
            os: "windows-latest"
            rust_target: "x86_64-pc-windows-msvc"
          - python: "3.13"
            os: "windows-latest"
            rust_target: "x86_64-pc-windows-msvc"

    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python }}"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.os }}-${{ matrix.rust_target }}-

      - name: Install python dependencies
        run: |
          uv python pin ${{ matrix.python }}
          uv sync --group dev

      - name: Check Python version
        if: matrix.os != 'windows-latest'
        run: |
          actual_version=$(uv run python --version)
          expected_version="Python ${{ matrix.python }}"
          if [ "$actual_version" != *"$expected_version"* ]; then
            echo "Expected $expected_version, but got $actual_version"
            exit 1
          fi

      - name: packaging
        run: |
          uv run maturin build --release --strip --interpreter python${{ matrix.python }} --target ${{ matrix.rust_target }}

      - name: test
        if: matrix.os != 'windows-latest'
        run: |
          rm ../target/wheels/*
          python3 -m venv .venv
          source .venv/bin/activate
          pip install .
          pip install pytest
          pytest tests
          python -c 'from kitsuyui_rust_playground import my_calc; assert my_calc(1, 2, 3) == "9"; print("OK")'
          deactivate

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ env.VERSION }}-${{ matrix.os }}-${{ matrix.python }}-${{ matrix.rust_target }}
          path: target/wheels/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: wheels-${{ env.VERSION }}-*
          path: target/wheels/

      - name: Publish distribution to GitHub Releases
        if: github.event_name == 'release' && !github.event.release.prerelease
        uses: softprops/action-gh-release@v2
        with:
          files: target/wheels/*

      - name: Publish distribution to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: github.event_name == 'release' && github.event.release.prerelease
        with:
          packages-dir: target/wheels/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

      - name: Publish distribution to PyPI
        if: github.event_name == 'release' && !github.event.release.prerelease
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: target/wheels/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
